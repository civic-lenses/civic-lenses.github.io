<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivicLenses — Contract Transparency Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar (Desktop) -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">civic<span>lenses</span></div>
      <div class="sidebar-tagline">Government contract transparency</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Navigate</div>
      <ul class="sidebar-nav">
        <li class="sidebar-nav-item active" data-page="feed">
          <svg class="sidebar-nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="6" height="6" rx="1.5"/>
            <rect x="11" y="3" width="6" height="6" rx="1.5"/>
            <rect x="3" y="11" width="6" height="6" rx="1.5"/>
            <rect x="11" y="11" width="6" height="6" rx="1.5"/>
          </svg>
          Feed
          <span class="sidebar-nav-badge" id="feed-badge"></span>
        </li>
      </ul>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Categories</div>
      <ul class="sidebar-nav" id="sidebar-categories"></ul>
    </div>

    <div class="sidebar-profile">
      <div class="sidebar-profile-card" id="sidebar-profile-card">
        <div class="sidebar-profile-header" id="profile-header">
          <div class="sidebar-profile-location" id="sidebar-location">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 1C4.8 1 3 2.8 3 5c0 3.5 4 7.5 4 7.5s4-4 4-7.5C11 2.8 9.2 1 7 1z"/>
              <circle cx="7" cy="5" r="1.5"/>
            </svg>
            <span id="location-text">Sign in for location</span>
          </div>
          <a class="sidebar-edit-link" id="auth-btn">Sign in</a>
        </div>
        <div id="profile-user" style="display:none;align-items:center;gap:8px;margin-bottom:10px">
          <img id="profile-avatar" width="24" height="24" style="border-radius:50%">
          <span id="profile-name" style="font-size:13px;font-weight:500;color:var(--color-text-inverse)"></span>
        </div>
        <div class="sidebar-topics" id="sidebar-selected-topics"></div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <!-- Mobile Header -->
    <div class="mobile-header">
      <div class="mobile-logo">civic<span>lenses</span></div>
      <div class="mobile-location" id="mobile-location">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M7 1C4.8 1 3 2.8 3 5c0 3.5 4 7.5 4 7.5s4-4 4-7.5C11 2.8 9.2 1 7 1z"/>
          <circle cx="7" cy="5" r="1.5"/>
        </svg>
        <span id="mobile-location-text">Sign in</span>
      </div>
    </div>

    <!-- Mobile Topics -->
    <div class="mobile-topics" id="mobile-topics"></div>

    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-inner">
        <div class="topbar-row">
          <h1 class="page-title">Contracts worth your attention</h1>
          <div class="topbar-stats">
            <div class="stat-item">
              <div class="stat-value stat-copper" id="stat-value">--</div>
              <div class="stat-label">Under review</div>
            </div>
            <div class="stat-item">
              <div class="stat-value stat-navy" id="stat-flagged">--</div>
              <div class="stat-label">Flagged</div>
            </div>
          </div>
        </div>

        <div class="tabs">
          <button class="tab active" data-tab="scrutiny">Under scrutiny <span class="tab-count" id="tab-scrutiny-count">0</span></button>
          <button class="tab" data-tab="high-value">High value <span class="tab-count" id="tab-value-count">0</span></button>
          <button class="tab" data-tab="just-cut">Just cut <span class="tab-count" id="tab-cut-count">0</span></button>
        </div>
      </div>
    </div>

    <!-- Feed -->
    <div class="feed">
      <div id="feed-section-label" class="feed-section-label"></div>
      <div class="cards-grid" id="cards-grid"></div>
    </div>
  </main>
</div>

<!-- Mobile Bottom Nav -->
<nav class="bottom-nav">
  <div class="nav-item active">
    <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="6" height="6" rx="1.5"/>
      <rect x="11" y="3" width="6" height="6" rx="1.5"/>
      <rect x="3" y="11" width="6" height="6" rx="1.5"/>
      <rect x="11" y="11" width="6" height="6" rx="1.5"/>
    </svg>
    <span class="nav-label">Feed</span>
  </div>
  <div class="nav-item">
    <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="9" r="6"/>
      <line x1="13.5" y1="13.5" x2="17" y2="17"/>
    </svg>
    <span class="nav-label">Search</span>
  </div>
  <div class="nav-item">
    <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round">
      <path d="M10 3L12.3 7.8H17.5L13.3 11.2L15 16.5L10 13.2L5 16.5L6.7 11.2L2.5 7.8H7.7L10 3Z"/>
    </svg>
    <span class="nav-label">Watchlist</span>
  </div>
  <div class="nav-item">
    <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="8" r="3.5"/>
      <path d="M4 17c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
    </svg>
    <span class="nav-label">Profile</span>
  </div>
</nav>

<script type="module" src="main.js"></script>
</body>
</html>
