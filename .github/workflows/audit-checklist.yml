# AI-assisted (Claude Code, claude.ai) — https://claude.ai
name: Audit Checklist

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "config.py"
      - "requirements.txt"
      - "README.md"
      - "docs/**"
      - "app/**"
      - "notebooks/**"
      - "models/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git checks

      - name: Run audit script
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/audit_checklist.py

      - name: Regenerate dashboard
        run: python3 scripts/generate_checklist.py

      - name: Create PR if checklist changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update checklist from audit"
          branch: automation/checklist-audit
          delete-branch: true
          title: "[Audit]: Update checklist"
          body: |
            Automated checklist audit based on current repo state.
            Review the diff to see which items were verified.
          add-paths: |
            .github/REQUIREMENTS_CHECKLIST.md
            docs/checklist/index.html
