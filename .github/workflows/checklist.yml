# AI-assisted (Claude Code, claude.ai) — https://claude.ai
name: Auto-check

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/REQUIREMENTS_CHECKLIST.md"
      - "scripts/generate_checklist.py"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate checklist page
        run: python3 scripts/generate_checklist.py

      - name: Write job summary
        run: |
          echo "## Requirements Checklist" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat .github/REQUIREMENTS_CHECKLIST.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "[View live checklist](https://civic-lenses.github.io/checklist/)" >> $GITHUB_STEP_SUMMARY

      - name: Create pull request if checklist changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate live checklist"
          branch: "automation/checklist-regeneration"
          delete-branch: true
          title: "chore: regenerate live checklist"
          body: |
            Automated checklist regeneration.
          add-paths: |
            docs/checklist/index.html
