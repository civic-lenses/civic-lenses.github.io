# AI-assisted (Claude Code, claude.ai) — https://claude.ai
name: Auto-check

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/REQUIREMENTS_CHECKLIST.md"
      - "scripts/generate_checklist.py"

permissions:
  contents: write

jobs:
  auto-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate checklist page
        run: python3 scripts/generate_checklist.py

      - name: Write job summary
        run: |
          echo "## Requirements Checklist" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat .github/REQUIREMENTS_CHECKLIST.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "[View live checklist](https://civic-lenses.github.io/checklist/)" >> $GITHUB_STEP_SUMMARY

      - name: Commit if checklist changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/checklist/index.html
          git diff --staged --quiet || git commit -m "chore: regenerate live checklist"
          git push origin main
